<header
  class="fixed inset-x-0 top-0 z-50 border-b border-[var(--border)] bg-[var(--bg)]/80 backdrop-blur-md"
>
  <nav
    class="mx-auto flex h-16 max-w-6xl items-center justify-between px-5 sm:px-8"
  >
    <a
      routerLink="/"
      class="font-mono text-sm font-semibold tracking-tight hover:text-brand-400"
    >
      daniel<span class="text-brand-400">.</span>jancar
    </a>

    <div class="hidden items-center gap-8 md:flex">
      @for (link of links; track link.href) {
        <a
          [routerLink]="['/']"
          [fragment]="link.href"
          class="text-sm text-[var(--text-soft)] transition-colors hover:text-[var(--text)]"
          >{{ link.label }}</a
        >
      }
      <a
        routerLink="/blog"
        class="text-sm text-[var(--text-soft)] transition-colors hover:text-[var(--text)]"
        >Blog</a
      >
      <button
        type="button"
        (click)="theme.toggle()"
        class="grid size-9 place-items-center rounded-full border border-[var(--border)] text-[var(--text-soft)] transition-colors hover:text-[var(--text)]"
        [attr.aria-label]="
          theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'
        "
      >
        <ng-icon
          [name]="theme.isDark() ? 'bootstrapSun' : 'bootstrapMoonStars'"
          size="18"
        />
      </button>
    </div>

    <button
      type="button"
      (click)="menuOpen.set(true)"
      class="grid size-9 place-items-center rounded-full border border-[var(--border)] md:hidden"
      aria-label="Open menu"
    >
      <ng-icon name="bootstrapList" size="20" />
    </button>
  </nav>
</header>

@if (menuOpen()) {
  <div
    class="nav-overlay fixed inset-0 z-[60] flex flex-col bg-[var(--bg)]/95 backdrop-blur-xl md:hidden"
  >
    <div
      class="flex h-16 items-center justify-between border-b border-[var(--border)] px-5"
    >
      <a
        routerLink="/"
        (click)="menuOpen.set(false)"
        class="font-mono text-sm font-semibold tracking-tight"
      >
        daniel<span class="text-brand-400">.</span>jancar
      </a>
      <button
        type="button"
        (click)="menuOpen.set(false)"
        class="grid size-9 place-items-center rounded-full border border-[var(--border)]"
        aria-label="Close menu"
      >
        <ng-icon name="bootstrapXLg" size="20" />
      </button>
    </div>

    <nav class="flex flex-1 flex-col justify-center gap-6 px-8">
      @for (link of links; track link.href; let i = $index) {
        <a
          [routerLink]="['/']"
          [fragment]="link.href"
          (click)="menuOpen.set(false)"
          class="nav-overlay-link text-4xl font-semibold tracking-tight text-[var(--text)] transition-colors hover:text-brand-400"
          [style.animation-delay.ms]="80 + i * 60"
          >{{ link.label }}</a
        >
      }
      <a
        routerLink="/blog"
        (click)="menuOpen.set(false)"
        class="nav-overlay-link text-4xl font-semibold tracking-tight text-[var(--text)] transition-colors hover:text-brand-400"
        [style.animation-delay.ms]="80 + links.length * 60"
        >Blog</a
      >
    </nav>

    <div class="border-t border-[var(--border)] px-8 py-6">
      <button
        type="button"
        (click)="theme.toggle()"
        class="flex items-center gap-3 text-base text-[var(--text-soft)] transition-colors hover:text-[var(--text)]"
      >
        <ng-icon
          [name]="theme.isDark() ? 'bootstrapSun' : 'bootstrapMoonStars'"
          size="20"
        />
        {{ theme.isDark() ? 'Light mode' : 'Dark mode' }}
      </button>
    </div>
  </div>
}
