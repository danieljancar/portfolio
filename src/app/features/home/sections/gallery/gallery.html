<section id="gallery" class="mx-auto max-w-5xl scroll-mt-24 px-5 py-20 md:px-8">
  <h2 class="font-mono text-sm text-brand-400">Gallery</h2>
  <p class="mt-2 text-[var(--text-soft)]">
    A handful of photos I've taken and kept coming back to.
  </p>

  <div class="mt-10 columns-2 gap-4 md:columns-3 [&>*]:mb-4">
    @for (photo of photos; track photo.src; let i = $index) {
      <button
        type="button"
        (click)="open(i)"
        [appReveal]="(i % 3) * 0.05"
        class="group block w-full overflow-hidden rounded-card border border-[var(--border)]"
      >
        <img
          [src]="photo.src"
          [alt]="photo.alt"
          loading="lazy"
          class="w-full transition-transform duration-300 group-hover:scale-105"
        />
      </button>
    }
  </div>
</section>

@if (active(); as photo) {
  <div
    role="dialog"
    aria-modal="true"
    aria-label="Photo viewer"
    class="fixed inset-0 z-[60] flex items-center justify-center bg-black/85 p-4 backdrop-blur-sm"
  >
    <button
      type="button"
      (click)="close()"
      aria-label="Close photo viewer"
      class="absolute inset-0 size-full cursor-default"
    ></button>
    <button
      type="button"
      (click)="close()"
      aria-label="Close"
      class="absolute right-5 top-5 grid size-10 place-items-center rounded-full bg-white/10 text-white hover:bg-white/20"
    >
      <ng-icon name="bootstrapXLg" size="20" />
    </button>
    <button
      type="button"
      (click)="prev()"
      aria-label="Previous"
      class="absolute left-4 grid size-10 place-items-center rounded-full bg-white/10 text-white hover:bg-white/20"
    >
      <ng-icon name="bootstrapChevronLeft" size="20" />
    </button>
    <figure class="relative max-h-full max-w-3xl">
      <img
        [src]="photo.src"
        [alt]="photo.alt"
        class="max-h-[80vh] w-auto rounded-card object-contain"
      />
      @if (photo.caption) {
        <figcaption class="mt-3 text-center text-sm text-white/70">
          {{ photo.caption }}
        </figcaption>
      }
    </figure>
    <button
      type="button"
      (click)="next()"
      aria-label="Next"
      class="absolute right-4 grid size-10 place-items-center rounded-full bg-white/10 text-white hover:bg-white/20"
    >
      <ng-icon name="bootstrapChevronRight" size="20" />
    </button>
  </div>
}
