@let post = blog();
@if (post; as post) {
  <article class="mx-auto max-w-3xl px-5 py-12 sm:py-16">
    <a
      routerLink="/blog"
      class="mb-8 inline-flex items-center gap-2 text-sm text-[var(--text-soft)] transition-colors hover:text-[var(--text)]"
    >
      <ng-icon name="bootstrapArrowLeft" size="16" /> All posts
    </a>

    <h1 class="text-balance text-3xl font-bold tracking-tight sm:text-4xl">
      {{ post.title }}
    </h1>

    <div
      class="mt-4 flex flex-wrap items-center gap-x-5 gap-y-2 text-sm text-[var(--text-soft)]"
    >
      <span class="inline-flex items-center gap-1.5">
        <ng-icon name="bootstrapClock" size="15" />
        {{ post.created | date: 'MMMM d, y' }}
      </span>
      <span class="inline-flex items-center gap-1.5">
        <ng-icon name="bootstrapBook" size="15" />
        {{ post.readTime }} min read
      </span>
      <span>by {{ author()?.name }}</span>
    </div>

    <figure class="my-8">
      <img
        [src]="'assets/blog/images/' + post.banner"
        [alt]="post.bannerAlt"
        class="aspect-video w-full rounded-card object-cover shadow-lg"
      />
      <figcaption
        class="mt-2 flex items-center justify-between text-xs text-[var(--text-soft)]"
      >
        <span class="inline-flex items-center gap-2">
          @if (post.bannerAiGenerated) {
            <span class="inline-flex items-center gap-1">
              <ng-icon name="bootstrapRobot" size="14" /> AI generated
            </span>
          }
        </span>
        <a
          [href]="post.bannerSource"
          target="_blank"
          rel="noopener"
          class="inline-flex items-center gap-1 hover:text-[var(--text)]"
        >
          Source <ng-icon name="bootstrapBoxArrowUpRight" size="12" />
        </a>
      </figcaption>
    </figure>

    <markdown
      class="prose-md"
      [src]="'assets/blog/content/' + post.content"
      ngPreserveWhitespaces
    />

    <div class="mt-10 flex flex-wrap gap-2 border-t border-[var(--border)] pt-6">
      @for (tag of post.tags; track tag) {
        <span
          class="rounded-full bg-[var(--bg-soft)] px-3 py-1 font-mono text-xs text-[var(--text-soft)]"
          >#{{ tag }}</span
        >
      }
    </div>
  </article>
}
